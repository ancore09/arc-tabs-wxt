<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Dots — vertical spine connects all tabs, filled dots = pinned, hollow = free -->

  <rect width="128" height="128" rx="26" fill="#18181b"/>

  <!-- Vertical spine -->
  <line x1="28" y1="22" x2="28" y2="106" stroke="#3f3f46" stroke-width="2"/>

  <!-- Pinned tab 1 -->
  <circle cx="28" cy="33" r="6" fill="#a78bfa"/>
  <rect x="40" y="22" width="66" height="22" rx="6" fill="#7c3aed"/>

  <!-- Pinned tab 2 -->
  <circle cx="28" cy="61" r="6" fill="#7c3aed"/>
  <rect x="40" y="50" width="66" height="22" rx="6" fill="#7c3aed" opacity="0.55"/>

  <!-- Free tab -->
  <circle cx="28" cy="95" r="6" fill="#3f3f46" stroke="#3f3f46" stroke-width="2"/>
  <rect x="40" y="84" width="66" height="22" rx="6" fill="#3f3f46"/>
</svg>
